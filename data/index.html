<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>age</td>
    <td>50</td>
    <td>1.00</td>
    <td>20.00</td>
    <td>10.88</td>
  </tr>
  <tr>
    <td>weight</td>
    <td>50</td>
    <td>63.76</td>
    <td>492.51</td>
    <td>273.69</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: animal</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>bear</td><td>13</td></tr><tr><td>fox</td><td>12</td></tr><tr><td>wolf</td><td>10</td></tr><tr><td>lion</td><td>9</td></tr><tr><td>tiger</td><td>6</td></tr></tbody>
  </table>
  <h2>Колонка: habitat</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>forest</td><td>21</td></tr><tr><td>arctic</td><td>15</td></tr><tr><td>savanna</td><td>14</td></tr></tbody>
  </table>
</body>
</html>
