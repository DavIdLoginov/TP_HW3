<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт по данным</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f2f5f9;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 2rem 1rem;
    }

    .report-card {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.05);
      padding: 1.8rem 2rem 2rem 2rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: #1e4663;
      margin-bottom: 0.5rem;
      border-left: 4px solid #3b82f6;
      padding-left: 1rem;
    }

    .subhead {
      color: #4a627a;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.75rem;
    }

    h2 {
      font-size: 1.3rem;
      font-weight: 500;
      color: #2c3e66;
      margin: 1.5rem 0 0.8rem 0;
      display: inline-block;
      background: #f0f4fa;
      padding: 0.2rem 1rem;
      border-radius: 30px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0 1.2rem 0;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,0.03);
    }

    th {
      background-color: #eef2f8;
      color: #1f3a5f;
      font-weight: 600;
      padding: 10px 12px;
      border-bottom: 1px solid #dce5ef;
      text-align: left;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid #e9edf2;
      background-color: #ffffff;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover td {
      background-color: #f8fafd;
      transition: 0.1s ease;
    }

    td:nth-child(2), td:nth-child(3), td:nth-child(4), td:nth-child(5),
    th:nth-child(2), th:nth-child(3), th:nth-child(4), th:nth-child(5) {
      text-align: right;
    }

    table:not(.full-metrics) td:first-child {
      text-align: left;
      font-weight: 500;
    }
    table:not(.full-metrics) td:last-child {
      text-align: right;
    }

    .total-badge {
      display: inline-block;
      background: #e6f0ff;
      border-radius: 40px;
      padding: 0.2rem 1rem;
      font-size: 0.85rem;
      color: #1e5b9e;
      margin-top: 0.2rem;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: #7c8ea0;
      border-top: 1px solid #e0e8f0;
      padding-top: 1rem;
    }

    @media (max-width: 600px) {
      .report-card { padding: 1rem; }
      td, th { padding: 6px 10px; font-size: 0.85rem; }
      h1 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="report-card">
  <h1>Отчёт по данным</h1>
  <div class="subhead">Всего строк: <strong>50</strong> <span class="total-badge">полная выборка</span></div>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
      <tr><td>age</td><td>50</td><td>1.00</td><td>20.00</td><td>10.18</td></tr>
      <tr><td>weight</td><td>50</td><td>73.65</td><td>496.26</td><td>284.17</td></tr>
    </tbody>
  </table>
  
  <h2>Колонка: animal</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody>
      <tr><td>tiger</td><td>14</td></tr>
      <tr><td>fox</td><td>12</td></tr>
      <tr><td>lion</td><td>11</td></tr>
      <tr><td>wolf</td><td>8</td></tr>
      <tr><td>bear</td><td>5</td></tr>
    </tbody>
  </table>
  
  <h2>Колонка: habitat</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody>
      <tr><td>savanna</td><td>20</td></tr>
      <tr><td>forest</td><td>15</td></tr>
      <tr><td>arctic</td><td>15</td></tr>
    </tbody>
  </table>
</div>
</body>
</html>
